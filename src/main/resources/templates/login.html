<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>Login page</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">

    <style>
        body {
            background-color: #f5f5f5;
        }
        .form-signin {
            width: 200px;
            margin: 0 auto;
        }

        /* ✅ Убираем все лишние отступы из полей ввода */
        .form-control {
            height: 32px !important;           /* Убираем фиксированную высоту */
            padding: 1px 1px !important;       /* Минимальные отступы */
            font-size: 14px;
            line-height: 1;                  /* Уменьшаем межстрочный интервал */
            border-radius: 0 !important;
        }

        .form-control::placeholder {
            color: #6c757d;
            opacity: 1
        }

        /* Делаем лейблы обычными (не floating) */
        .form-label {
            margin-bottom: 2px;
            font-size: 14px;
            color: #333;
            display: block;
        }

        h1 {
            font-size: 18px;
            margin-bottom: 10px;
            text-align: left;
        }

        .btn {
            margin-top: 5px;
            padding: 4px 10px;
            font-size: 14px;
        }

        .alert {
            padding: 4px 8px !important;
            margin-bottom: 8px !important;
            font-size: 13px;
        }

        /* Убираем стандартные тени и скругления если нужно */
        .form-control:focus {
            box-shadow: none;
            border-color: #86b7fe;
        }
    </style>
</head>
<body>

<div class="d-flex justify-content-center mt-4">
    <main class="form-signin">
        <h1><b>Please sign in</b></h1>

        <div th:if="${param.error}" class="alert alert-danger">
            Invalid username or password
        </div>
        <div th:if="${param.logout}" class="alert alert-success">
            You have been logged out
        </div>

        <form method="post" th:action="@{/login}">
            <!-- ✅ Обычное поле, не form-floating -->
            <div class="mb-1">
                <label for="username" class="form-label"></label>
                <input type="email" class="form-control" id="username" name="username"
                       placeholder="Email address" required autofocus>
            </div>

            <div class="mb-1">
                <label for="password" class="form-label"></label>
                <input type="password" class="form-control" id="password" name="password"
                       placeholder="Password" required>
            </div>

            <button class="w-100 btn btn-primary" type="submit">
                Sign in
            </button>
        </form>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>
