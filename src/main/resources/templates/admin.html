<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .sidebar {
            min-height: calc(100vh - 56px);
            background-color: #f8f9fa;
            border-right: 1px solid #dee2e6;
        }

        .sidebar .nav-link {
            color: #333;
            padding: 0.75rem 1rem;
            margin: 0.25rem 0;
            border-radius: 0;
        }

        /* ✅ Добавить эти стили для подсветки */
        .sidebar .nav-link.active {
            background-color: #007bff;
            color: white;
        }

        .sidebar .nav-link.active:hover {
            background-color: #0056b3;
        }

        .main-content {
            padding: 20px;
        }

        .new-user-link {
            color: #007bff;
            text-decoration: none;
            cursor: pointer;
            margin-left: 15px;
            font-size: 1rem;
        }

        .new-user-link:hover {
            text-decoration: underline;
            color: #0056b3;
        }

        .users-table-header {
            display: flex;
            align-items: center;
        }
    </style>
</head>
<body class="bg-light">

<!-- Сообщения об успехе/ошибке -->
<div id="successMessage" class="alert alert-success alert-dismissible fade show m-3" role="alert" style="display: none;">
    <span></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
</div>
<div id="errorMessage" class="alert alert-danger alert-dismissible fade show m-3" role="alert" style="display: none;">
    <span></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
</div>

<!-- Верхняя полоска с email и logout -->
<nav class="navbar navbar-expand navbar-light bg-white border-bottom">
    <div class="container-fluid px-4">
        <!-- Email и роль слева -->
        <span class="navbar-text" id="userInfo">
            Loading...
        </span>

        <!-- Кнопка Logout справа -->
        <form id="logoutForm" method="post" class="mb-0">
            <button type="submit" class="btn btn-outline-secondary btn-sm">
                Logout
            </button>
        </form>
    </div>
</nav>

<!-- Основной контент с боковой панелью -->
<div class="container-fluid">
    <div class="row">
        <!-- Боковая панель -->
        <div class="col-md-2 p-0 sidebar">
            <div class="p-0">
                <nav class="nav flex-column">
                    <a class="nav-link" href="#" onclick="filterByRole('ADMIN')" id="adminFilter">Admin</a>
                    <a class="nav-link" href="#" onclick="filterByRole('USER')" id="userFilter">User</a>
                </nav>
            </div>
        </div>

        <!-- Основной контент -->
        <div class="col-md-10 main-content">
            <!-- Заголовок Admin panel -->
            <h2 class="mb-4">Admin panel</h2>

            <!-- Заголовок User -->
            <div class="mb-3">
                <h6 class="mb-0">
                    Users table
                    <a href="#" onclick="openCreateModal()" class="new-user-link">New User</a>
                </h6>
            </div>

            <!-- Users Table с ссылкой New User рядом -->
            <div class="users-table-header mb-3">
                <h5 class="mb-0">All Users</h5>
            </div>

            <!-- Таблица -->
            <div class="card shadow">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                        <tr>
                            <th>ID</th>
                            <th>First Name</th>
                            <th>Last Name</th>
                            <th>Age</th>
                            <th>Email</th>
                            <th>Role</th>
                            <th>Edit</th>
                            <th>Delete</th>
                        </tr>
                        </thead>
                        <tbody id="usersTableBody">
                        <!-- JavaScript заполнит эту таблицу -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Модальное окно для создания/редактирования пользователя -->
<!-- Модальное окно для создания/редактирования пользователя -->
<div class="modal fade" id="userModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">Create User</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="userForm">
                    <input type="hidden" id="userId">

                    <div class="mb-3">
                        <label for="firstName" class="form-label">First Name</label>
                        <input type="text" class="form-control" id="firstName" required>
                    </div>

                    <div class="mb-3">
                        <label for="lastName" class="form-label">Last Name</label>
                        <input type="text" class="form-control" id="lastName" required>
                    </div>

                    <div class="mb-3">
                        <label for="age" class="form-label">Age</label>
                        <input type="number" class="form-control" id="age" required>
                    </div>

                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" required>
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control" id="password">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Roles</label>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" value="1" id="roleAdmin">
                            <label class="form-check-label" for="roleAdmin">ADMIN</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" value="2" id="roleUser">
                            <label class="form-check-label" for="roleUser">USER</label>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                <button type="button" class="btn btn-primary" onclick="saveUser()">Save</button>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    let currentRole = null;
    let modal;

    // Инициализация при загрузке страницы
    document.addEventListener('DOMContentLoaded', function() {
        modal = new bootstrap.Modal(document.getElementById('userModal'));
        loadUserInfo();
        loadUsers();

        // Обработка logout
        document.getElementById('logoutForm').action = '/logout';
    });

    // Загрузка информации о текущем пользователе
    function loadUserInfo() {
        fetch('/api/user/current')
            .then(response => response.json())
            .then(user => {
                const roles = user.roles.map(r => r.name.replace('ROLE_', '')).join(', ');
                document.getElementById('userInfo').textContent =
                    `${user.email} with roles: ${roles}`;
            })
            .catch(error => {
                console.error('Error loading user info:', error);
            });
    }

    // Загрузка списка пользователей
    function loadUsers() {
        let url = '/api/users';
        if (currentRole) {
            url = `/api/users?role=${currentRole}`;
        }

        fetch(url)
            .then(response => response.json())
            .then(users => {
                const tbody = document.getElementById('usersTableBody');
                tbody.innerHTML = '';

                users.forEach(user => {
                    const row = tbody.insertRow();
                    const roles = user.roles.map(r => r.name.replace('ROLE_', '')).join(' ');

                    row.innerHTML = `
                        <td>${user.id}</td>
                        <td>${user.firstName}</td>
                        <td>${user.lastName}</td>
                        <td>${user.age}</td>
                        <td>${user.email}</td>
                        <td><span class="badge bg-secondary me-1">${roles}</span></td>
                        <td>
                            <button class="btn btn-info btn-sm" onclick="editUser(${user.id})">Edit</button>
                        </td>
                        <td>
                            <button class="btn btn-danger btn-sm" onclick="deleteUser(${user.id})">Delete</button>
                        </td>
                    `;
                });
            })
            .catch(() => {
                showError('Error loading users');
            });
    }

    // Фильтрация по роли
    function filterByRole(role) {
        currentRole = role;
        document.getElementById('adminFilter').classList.remove('active');
        document.getElementById('userFilter').classList.remove('active');
        document.getElementById(role === 'ADMIN' ? 'adminFilter' : 'userFilter').classList.add('active');
        loadUsers();
    }

    // Открыть модальное окно для создания
    function openCreateModal() {
        document.getElementById('modalTitle').textContent = 'Create User';
        document.getElementById('userId').value = '';
        document.getElementById('firstName').value = '';
        document.getElementById('lastName').value = '';
        document.getElementById('age').value = '';
        document.getElementById('email').value = '';
        document.getElementById('password').value = '';
        document.getElementById('roleAdmin').checked = false;
        document.getElementById('roleUser').checked = false;
        modal.show();
    }

    // Редактирование пользователя
    function editUser(id) {
        fetch(`/api/users/${id}`)
            .then(response => response.json())
            .then(user => {
                document.getElementById('modalTitle').textContent = 'Edit User';
                document.getElementById('userId').value = user.id;
                document.getElementById('firstName').value = user.firstName;
                document.getElementById('lastName').value = user.lastName;
                document.getElementById('age').value = user.age;
                document.getElementById('email').value = user.email;
                document.getElementById('password').value = '';

                // Отмечаем роли
                document.getElementById('roleAdmin').checked =
                    user.roles.some(r => r.name === 'ROLE_ADMIN');
                document.getElementById('roleUser').checked =
                    user.roles.some(r => r.name === 'ROLE_USER');

                modal.show();
            })
            .catch(() => {
                showError('Error loading user data');
            });
    }

    // Сохранение пользователя
    function saveUser() {
        const id = document.getElementById('userId').value;
        const user = {
            firstName: document.getElementById('firstName').value,
            lastName: document.getElementById('lastName').value,
            age: parseInt(document.getElementById('age').value),
            email: document.getElementById('email').value,
            password: document.getElementById('password').value || null
        };

        const roleIds = [];
        if (document.getElementById('roleAdmin').checked) roleIds.push(1);
        if (document.getElementById('roleUser').checked) roleIds.push(2);

        const url = id ? `/api/users/${id}` : '/api/users';
        const method = id ? 'PUT' : 'POST';

        // Добавляем roleIds как query параметры
        const queryParams = roleIds.map(id => `roleIds=${id}`).join('&');
        const fullUrl = queryParams ? `${url}?${queryParams}` : url;

        fetch(fullUrl, {
            method: method,
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(user)
        })
            .then(response => {
                if (!response.ok) {
                    return response.text().then(text => { throw new Error(text); });
                }
                return response.json();
            })
            .then(() => {
                modal.hide();
                loadUsers();
                showSuccess(id ? 'User updated successfully' : 'User created successfully');
            })
            .catch(error => {
                showError(error.message);
            });
    }

    // Удаление пользователя
    function deleteUser(id) {
        if (!confirm('Are you sure?')) return;

        fetch(`/api/users/${id}`, {
            method: 'DELETE'
        })
            .then(response => {
                if (response.ok) {
                    loadUsers();
                    showSuccess('User deleted successfully');
                } else {
                    throw new Error('Error deleting user');
                }
            })
            .catch(error => {
                showError(error.message);
            });
    }

    // Показать сообщение об успехе
    function showSuccess(message) {
        const alert = document.getElementById('successMessage');
        alert.querySelector('span').textContent = message;
        alert.style.display = 'block';
        setTimeout(() => {
            alert.style.display = 'none';
        }, 3000);
    }

    // Показать сообщение об ошибке
    function showError(message) {
        const alert = document.getElementById('errorMessage');
        alert.querySelector('span').textContent = message;
        alert.style.display = 'block';
        setTimeout(() => {
            alert.style.display = 'none';
        }, 3000);
    }
</script>

</body>
</html>>
