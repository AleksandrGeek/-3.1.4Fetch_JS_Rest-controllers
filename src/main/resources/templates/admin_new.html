<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Add new user</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">Add New User</h4>
                </div>
                <div class="card-body">
                    <form th:action="@{/admin/create}" method="post" th:object="${user}">

                        <!-- ✅ ДОБАВЛЕНО: First Name -->
                        <div class="mb-3">
                            <label class="form-label">First Name</label>
                            <label>
                                <input type="text" class="form-control" th:field="*{firstName}" required>
                            </label>
                        </div>

                        <!-- ✅ ДОБАВЛЕНО: Last Name -->
                        <div class="mb-3">
                            <label class="form-label">Last Name</label>
                            <label>
                                <input type="text" class="form-control" th:field="*{lastName}" required>
                            </label>
                        </div>

                        <!-- ✅ ДОБАВЛЕНО: Age (Integer) -->
                        <div class="mb-3">
                            <label class="form-label">Age</label>
                            <label>
                                <input type="number" class="form-control" th:field="*{age}" required>
                            </label>
                        </div>

                        <!-- Email (логин) -->
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <label>
                                <input type="email" class="form-control" th:field="*{email}" required>
                            </label>
                        </div>

                        <!-- Password -->
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <label>
                                <input type="password" class="form-control" th:field="*{password}" required>
                            </label>
                        </div>

                        <!-- Roles -->
                        <div class="mb-3">
                            <label class="form-label">Roles</label>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" name="roleIds" value="1" id="roleAdmin">
                                <label class="form-check-label" for="roleAdmin">ADMIN</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" name="roleIds" value="2" id="roleUser">
                                <label class="form-check-label" for="roleUser">USER</label>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary">Create User</button>
                        <a href="/admin" class="btn btn-secondary">Cancel</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
