<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Edit user</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-warning">
                    <h4 class="mb-0">Edit User</h4>
                </div>
                <div class="card-body">
                    <form th:action="@{/admin/update}" method="post" th:object="${user}">
                        <input type="hidden" th:field="*{id}">

                        <!-- First Name -->
                        <div class="mb-3">
                            <label class="form-label">First Name</label>
                            <label>
                                <input type="text" class="form-control" th:field="*{firstName}" required>
                            </label>
                        </div>

                        <!-- Last Name -->
                        <div class="mb-3">
                            <label class="form-label">Last Name</label>
                            <label>
                                <input type="text" class="form-control" th:field="*{lastName}" required>
                            </label>
                        </div>

                        <!-- Age -->
                        <div class="mb-3">
                            <label class="form-label">Age</label>
                            <label>
                                <input type="number" class="form-control" th:field="*{age}" required>
                            </label>
                        </div>

                        <!-- Email -->
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <label>
                                <input type="email" class="form-control" th:field="*{email}" required>
                            </label>
                        </div>

                        <!-- Password (опционально) -->
                        <div class="mb-3">
                            <label class="form-label">Password (leave blank to keep current)</label>
                            <label>
                                <input type="password" class="form-control" th:field="*{password}">
                            </label>
                        </div>

                        <!-- Roles -->
                        <div class="mb-3">
                            <label class="form-label">Roles</label>
                            <div class="form-check">
                                <label>
                                    <input class="form-check-input" type="checkbox" name="roleIds" value="1"
                                           th:checked="${user.roles.contains('ROLE_ADMIN')}">
                                </label>
                                <label class="form-check-label">ADMIN</label>
                            </div>
                            <div class="form-check">
                                <label>
                                    <input class="form-check-input" type="checkbox" name="roleIds" value="2"
                                           th:checked="${user.roles.contains('ROLE_USER')}">
                                </label>
                                <label class="form-check-label">USER</label>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-warning">Update</button>
                        <a href="/admin" class="btn btn-secondary">Cancel</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
