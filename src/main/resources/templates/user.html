<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>User information-page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<!-- Верхняя полоска с email и logout -->
<nav class="navbar navbar-expand navbar-light bg-white border-bottom">
    <div class="container-fluid px-4">
        <!-- Email и роль слева - заполняется через JS -->
        <span class="navbar-text" id="userInfo">
            Loading...
        </span>

        <!-- Кнопка Logout справа -->
        <form action="/logout" method="post" class="mb-0">
            <button type="submit" class="btn btn-outline-secondary btn-sm">
                Logout
            </button>
        </form>
    </div>
</nav>

<!-- Основной контент -->
<div class="container mt-5">
    <!-- Заголовки -->
    <h2 class="mb-3">User information-page</h2>
    <h4 class="mb-4 text-secondary">About user</h4>

    <!-- Таблица -->
    <div class="table-responsive">
        <table class="table table-bordered">
            <thead class="table-light">
            <tr>
                <th>ID</th>
                <th>First Name</th>
                <th>Last Name</th>
                <th>Age</th>
                <th>Email</th>
                <th>Role</th>
            </tr>
            </thead>
            <tbody id="userInfoBody">
            <!-- JavaScript заполнит эту таблицу -->
            </tbody>
        </table>
    </div>

    <!-- Ссылка на админку для админов (скрыта по умолчанию) -->
    <div id="adminLink" style="display: none;" class="mt-3">
        <a href="/admin" class="btn btn-outline-primary">Go to Admin Panel</a>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // Загрузка информации о пользователе
    document.addEventListener('DOMContentLoaded', function() {
        fetch('/api/user/current')
            .then(response => {
                if (!response.ok) {
                    throw new Error('Failed to load user data');
                }
                return response.json();
            })
            .then(user => {
                console.log('User loaded:', user); // для отладки

                // Обновляем информацию в шапке
                const roles = user.roles.map(r => r.name.replace('ROLE_', '')).join(', ');
                document.getElementById('userInfo').textContent =
                    `${user.email} with roles: ${roles}`;

                // Заполняем таблицу
                const tbody = document.getElementById('userInfoBody');
                tbody.innerHTML = `
                    <tr>
                        <td>${user.id}</td>
                        <td>${user.firstName}</td>
                        <td>${user.lastName}</td>
                        <td>${user.age}</td>
                        <td>${user.email}</td>
                        <td>
                            ${user.roles.map(r =>
                    `<span class="badge bg-primary">${r.name.replace('ROLE_', '')}</span>`
                ).join(' ')}
                        </td>
                    </tr>
                `;

                // Показываем ссылку на админку если есть роль ADMIN
                if (user.roles.some(r => r.name === 'ROLE_ADMIN')) {
                    document.getElementById('adminLink').style.display = 'block';
                }
            })
            .catch(error => {
                console.error('Error loading user:', error);
                document.getElementById('userInfo').textContent = 'Error loading user data';

                // Показываем сообщение об ошибке в таблице
                document.getElementById('userInfoBody').innerHTML = `
                    <tr>
                        <td colspan="6" class="text-center text-danger">
                            Failed to load user data. Please try again.
                        </td>
                    </tr>
                `;
            });
    });
</script>

</body>
</html>
