<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>User information-page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<!-- Верхняя полоска с email и logout -->
<!-- Верхняя полоска с email и logout -->
<nav class="navbar navbar-expand navbar-light bg-white border-bottom">
    <div class="container-fluid px-4">
        <!-- Email и роль слева - теперь динамические -->
        <span class="navbar-text" th:text="${user.email} + ' with roles: ' + ${user.roles[0].name.replace('ROLE_', '')}">
            user@mail.ru with roles: USER
        </span>

        <!-- Кнопка Logout справа -->
        <form th:action="@{/logout}" method="post" class="mb-0">
            <button type="submit" class="btn btn-outline-secondary btn-sm">
                Logout
            </button>
        </form>
    </div>
</nav>

<!-- Основной контент -->
<div class="container mt-5">
    <!-- Заголовки -->
    <h2 class="mb-3">User information-page</h2>
    <h4 class="mb-4 text-secondary">About user</h4>

    <!-- Таблица -->
    <div class="table-responsive">
        <table class="table table-bordered">
            <thead class="table-light">
            <tr>
                <th>ID</th>
                <th>First Name</th>
                <th>Last Name</th>
                <th>Age</th>
                <th>Email</th>
                <th>Role</th>
            </tr>
            </thead>
            <tbody>
            <tr>
                <td th:text="${user.id}">3</td>
                <td th:text="${user.firstName}">user</td>
                <td th:text="${user.lastName}">user</td>
                <td th:text="${user.age}">30</td>
                <td th:text="${user.email}">user@mail.ru</td>
                <td>
                    <span th:each="role : ${user.roles}"
                          th:text="${role.name.replace('ROLE_', '')}"
                          class="badge bg-primary">USER</span>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <!-- Ссылка на админку для админов (опционально) -->
    <div th:if="${user.roles.contains('ROLE_ADMIN')}" class="mt-3">
        <a href="/admin" class="btn btn-outline-primary">Go to Admin Panel</a>
    </div>
</div>

<!-- Bootstrap JS (опционально, для некоторых компонентов) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
